name: Generate Snake

on:
  schedule:
    # প্রতি ১২ ঘণ্টা অন্তর আপডেট হবে
    - cron: "0 */12 * * *"
  
  # ম্যানুয়ালি রান করার অপশন
  workflow_dispatch:
  
  # মেইন ব্রাঞ্চে কোনো পুশ হলে রান হবে
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-light.svg?palette=github-light&color_snake=green
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=green

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
